<template>
  <div class="page">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span>订单管理</span>
        </div>
        <ResponsiveActions :is-mobile="isMobile">
          <!-- PC端布局 -->
          <template #desktop>
            <el-input
              v-model="searchKeyword"
              placeholder="搜索订单号/客户/骑手"
              size="small"
              style="width: 200px; margin-right: 8px;"
              clearable
              @keyup.enter="handleSearch"
            />
            <el-select v-model="statusFilter" size="small" style="width: 120px; margin-right: 8px;" clearable placeholder="状态筛选">
              <el-option label="全部" value="" />
              <el-option label="待确认" value="pending" />
              <el-option label="待上门" value="accepted" />
              <el-option label="配送中" value="delivering" />
              <el-option label="待付款" value="priced" />
              <el-option label="待核销" value="paid_unused" />
              <el-option label="已核销" value="redeemed" />
              <el-option label="退款中" value="refunding" />
              <el-option label="已退款" value="refunded" />
              <el-option label="已过期" value="expired" />
              <el-option label="已完成" value="completed" />
              <el-option label="已取消" value="cancelled" />
            </el-select>
            <el-select v-model="bizTypeFilter" size="small" style="width: 120px; margin-right: 8px;" clearable placeholder="业务筛选">
              <el-option label="全部业务" value="" />
              <el-option label="外卖" value="takeout" />
              <el-option label="团购" value="groupbuy" />
            </el-select>
            <el-button size="small" @click="handleSearch">搜索</el-button>
            <el-button size="small" @click="loadOrders(true)" :loading="loading">刷新</el-button>
            <el-button type="danger" size="small" @click="handleClearAllOrders" :loading="clearing">清空订单</el-button>
          </template>
          
          <!-- 移动端布局 -->
          <template #mobile>
            <div class="mobile-search-row">
              <el-input
                v-model="searchKeyword"
                placeholder="搜索订单号/客户/骑手"
                size="small"
                clearable
                @keyup.enter="handleSearch"
              >
                <template #prefix>
                  <el-icon><Search /></el-icon>
                </template>
              </el-input>
              <el-button size="small" type="primary" @click="handleSearch" :icon="Search">搜索</el-button>
            </div>
            <div class="mobile-filter-row">
              <el-select v-model="statusFilter" size="small" clearable placeholder="状态筛选" style="flex: 1;">
                <el-option label="全部" value="" />
                <el-option label="待确认" value="pending" />
                <el-option label="待上门" value="accepted" />
                <el-option label="配送中" value="delivering" />
                <el-option label="待付款" value="priced" />
                <el-option label="待核销" value="paid_unused" />
                <el-option label="已核销" value="redeemed" />
                <el-option label="退款中" value="refunding" />
                <el-option label="已退款" value="refunded" />
                <el-option label="已过期" value="expired" />
                <el-option label="已完成" value="completed" />
                <el-option label="已取消" value="cancelled" />
              </el-select>
              <el-select v-model="bizTypeFilter" size="small" clearable placeholder="业务筛选" style="flex: 1;">
                <el-option label="全部业务" value="" />
                <el-option label="外卖" value="takeout" />
                <el-option label="团购" value="groupbuy" />
              </el-select>
              <el-button size="small" @click="loadOrders(true)" :loading="loading" :icon="Refresh">刷新</el-button>
              <el-dropdown trigger="click" @command="handleMobileAction">
                <el-button size="small" :icon="More">
                  更多
                </el-button>
                <template #dropdown>
                  <el-dropdown-menu>
                    <el-dropdown-item command="clear" divided>
                      <el-icon><Delete /></el-icon>
                      <span>清空订单</span>
                    </el-dropdown-item>
                  </el-dropdown-menu>
                </template>
              </el-dropdown>
            </div>
          </template>
        </ResponsiveActions>
      </div>
      <PageStateAlert :message="loadError" />
      <!-- PC端表格 -->
      <el-table
        v-if="!isMobile"
        :data="orders"
        stripe
        size="small"
        v-loading="loading"
        @row-click="handleRowClick"
      >
        <el-table-column prop="daily_order_id" label="订单号" width="130" />
        <el-table-column label="订单类型" width="90">
          <template #default="{ row }">
            <span>{{ getOrderTypeText(row) }}</span>
          </template>
        </el-table-column>
        <el-table-column label="状态" width="90">
          <template #default="{ row }">
            <el-tag :type="getStatusTagType(row.status)" size="small">
              {{ getStatusText(row.status, row) }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="客户" width="110">
          <template #default="{ row }">
            <div>{{ row.customer_name || row.customer_phone || '-' }}</div>
          </template>
        </el-table-column>
        <el-table-column label="骑手" width="110">
          <template #default="{ row }">
            <div>{{ row.rider_name || row.rider_phone || '-' }}</div>
          </template>
        </el-table-column>
        <el-table-column label="订单内容" align="center">
          <template #default>
            <span class="see-detail-text">见详情</span>
          </template>
        </el-table-column>
        <el-table-column prop="dorm_number" label="宿舍" width="80" />
        <el-table-column label="金额" width="80" align="right">
          <template #default="{ row }">
            <span v-if="row.total_price">¥{{ row.total_price }}</span>
            <span v-else-if="row.package_price">¥{{ row.package_price }}</span>
            <span v-else>-</span>
          </template>
        </el-table-column>
        <el-table-column prop="created_at" label="创建时间" width="150" />
        <el-table-column label="操作" width="180" fixed="right">
          <template #default="{ row }">
            <el-button
              v-if="canQuickDispatch(row)"
              type="warning"
              text
              size="small"
              :loading="dispatchingOrderId === row.id"
              @click.stop="handleQuickDispatch(row)"
            >
              一键派单
            </el-button>
            <el-button type="primary" text size="small" @click.stop="openDetail(row)">查看</el-button>
          </template>
        </el-table-column>
        <template #empty>
          <el-empty :description="loadError ? '加载失败，暂无可显示数据' : '暂无订单数据'" :image-size="90" />
        </template>
      </el-table>

      <!-- 移动端卡片列表 -->
      <div v-else class="mobile-orders-list" v-loading="loading">
        <div
          v-for="order in orders"
          :key="order.id"
          class="mobile-order-card"
          @click="openDetail(order)"
        >
          <div class="mobile-order-header">
            <div class="mobile-order-id">订单 #{{ order.daily_order_id }}</div>
            <el-tag :type="getStatusTagType(order.status)" size="small">
              {{ getStatusText(order.status, order) }}
            </el-tag>
          </div>
          
          <div class="mobile-order-type">
            <span class="type-icon">{{ getOrderTypeIcon(order) }}</span>
            <span class="type-text">{{ getOrderTypeText(order) }}</span>
          </div>

          <div class="mobile-order-content">
            <div class="mobile-order-item" v-if="order.service_type === 'phone_film'">
              <span class="item-label">📱 服务：</span>
              <span class="item-value">{{ order.service_description || '手机贴膜服务' }}</span>
              <span v-if="order.package_name" class="item-value"> - {{ order.package_name }}</span>
              <span v-if="order.phone_model" class="item-value"> ({{ order.phone_model }})</span>
            </div>
            <div class="mobile-order-item" v-else-if="order.service_type === 'massage'">
              <span class="item-label">💆 服务：</span>
              <span class="item-value">{{ order.service_description || '推拿按摩服务' }}</span>
              <span v-if="order.package_name" class="item-value"> - {{ order.package_name }}</span>
            </div>
            <div class="mobile-order-item" v-if="order.food_request">
              <span class="item-label">🍽️ 餐食：</span>
              <span class="item-value">{{ order.food_request }}</span>
            </div>
            <div class="mobile-order-item" v-if="order.drink_request">
              <span class="item-label">🥤 饮品：</span>
              <span class="item-value">{{ order.drink_request }}</span>
            </div>
            <div class="mobile-order-item" v-if="order.delivery_request">
              <span class="item-label">📮 快递：</span>
              <span class="item-value">{{ order.delivery_request }}</span>
            </div>
            <div class="mobile-order-item" v-if="order.errand_request && !order.service_type">
              <span class="item-label">🚴 跑腿：</span>
              <span class="item-value">{{ order.errand_request }}</span>
            </div>
          </div>

          <div class="mobile-order-footer">
            <div class="mobile-order-info">
              <div class="info-item">
                <span class="info-label">客户：</span>
                <span class="info-value">{{ order.customer_name || order.customer_phone || '-' }}</span>
              </div>
              <div class="info-item" v-if="order.rider_name || order.rider_phone">
                <span class="info-label">骑手：</span>
                <span class="info-value">{{ order.rider_name || order.rider_phone }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">宿舍：</span>
                <span class="info-value">{{ order.dorm_number || '-' }}</span>
              </div>
            </div>
            <div class="mobile-order-meta">
              <div class="meta-price" v-if="order.total_price || order.package_price">
                ¥{{ order.total_price || order.package_price }}
              </div>
              <div class="meta-time">{{ formatTime(order.created_at) }}</div>
            </div>
          </div>
          <div v-if="canQuickDispatch(order)" class="mobile-order-actions">
            <el-button
              type="warning"
              size="small"
              :loading="dispatchingOrderId === order.id"
              @click.stop="handleQuickDispatch(order)"
            >
              一键派单
            </el-button>
          </div>
        </div>
        <div v-if="orders.length === 0 && !loading" class="mobile-empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-text">暂无订单</div>
        </div>
      </div>
      <div class="pagination-container">
        <el-pagination
          v-model:current-page="currentPage"
          v-model:page-size="pageSize"
          :page-sizes="isMobile ? [5, 10, 15] : [15, 30, 50, 100]"
          :total="total"
          :layout="isMobile ? 'total, prev, pager, next' : 'total, sizes, prev, pager, next, jumper'"
          @size-change="handleSizeChange"
          @current-change="handlePageChange"
        />
      </div>
      <el-dialog v-model="detailVisible" title="订单详情" width="800px" :close-on-click-modal="false">
        <template #default>
          <div class="detail-container">
            <!-- 基本信息 -->
            <el-descriptions title="基本信息" :column="2" size="small" border>
              <el-descriptions-item label="订单ID">{{ detail.id || '-' }}</el-descriptions-item>
              <el-descriptions-item label="订单号">{{ detail.daily_order_id || '-' }}</el-descriptions-item>
              <el-descriptions-item label="状态" :span="2">
                <el-tag :type="getStatusTagType(detail.status)" size="small">
                  {{ getStatusText(detail.status, detail) }}
                </el-tag>
              </el-descriptions-item>
              <el-descriptions-item label="订单类型">{{ getOrderTypeText(detail) }}</el-descriptions-item>
              <el-descriptions-item label="每日订单序号">{{ detail.daily_order_number || '-' }}</el-descriptions-item>
            </el-descriptions>

            <!-- 客户信息 -->
            <el-descriptions title="客户信息" :column="2" size="small" border style="margin-top: 16px;">
              <el-descriptions-item label="客户姓名">{{ detail.customer_name || '-' }}</el-descriptions-item>
              <el-descriptions-item label="客户手机">{{ detail.customer_phone || detail.phone || '-' }}</el-descriptions-item>
              <el-descriptions-item label="客户ID">{{ detail.user_id || '-' }}</el-descriptions-item>
              <el-descriptions-item label="宿舍号">{{ detail.dorm_number || '-' }}</el-descriptions-item>
            </el-descriptions>

            <!-- 骑手信息 -->
            <el-descriptions v-if="detail.rider_id || detail.rider_name || detail.rider_phone" title="骑手信息" :column="2" size="small" border style="margin-top: 16px;">
              <el-descriptions-item label="骑手姓名">{{ detail.rider_name || '-' }}</el-descriptions-item>
              <el-descriptions-item label="骑手手机">{{ detail.rider_phone || '-' }}</el-descriptions-item>
              <el-descriptions-item label="骑手ID">{{ detail.rider_id || '-' }}</el-descriptions-item>
            </el-descriptions>

            <!-- 订单内容 -->
            <el-descriptions title="订单内容" :column="2" size="small" border style="margin-top: 16px;">
              <!-- 服务订单 - 手机贴膜 -->
              <template v-if="detail.service_type === 'phone_film'">
                <el-descriptions-item label="服务类型">📱 手机贴膜</el-descriptions-item>
                <el-descriptions-item v-if="detail.package_price" label="套餐价格">
                  <span style="color: #f56c6c; font-weight: bold;">¥{{ detail.package_price }}</span>
                </el-descriptions-item>
                <el-descriptions-item v-if="detail.package_name" label="套餐名称" :span="detail.package_price ? 1 : 2">{{ detail.package_name }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.phone_model" label="手机型号">{{ detail.phone_model }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.service_description" label="服务描述" :span="2">{{ detail.service_description }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.special_notes" label="特殊要求" :span="2">{{ detail.special_notes }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.preferred_time" label="期望时间" :span="2">{{ detail.preferred_time }}</el-descriptions-item>
              </template>

              <!-- 服务订单 - 推拿按摩 -->
              <template v-else-if="detail.service_type === 'massage'">
                <el-descriptions-item label="服务类型">💆 推拿按摩</el-descriptions-item>
                <el-descriptions-item v-if="detail.package_name" label="套餐名称">{{ detail.package_name }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.service_description" label="服务描述" :span="2">{{ detail.service_description }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.special_notes" label="特殊要求" :span="2">{{ detail.special_notes }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.preferred_time" label="期望时间" :span="2">{{ detail.preferred_time }}</el-descriptions-item>
              </template>

              <!-- 餐食服务 -->
              <template v-else-if="detail.food_request">
                <el-descriptions-item label="餐食请求" :span="2">{{ detail.food_request }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.food_shop" label="餐厅">{{ detail.food_shop }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.food_allergies" label="过敏信息">{{ detail.food_allergies }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.taste_notes" label="口味备注" :span="2">{{ detail.taste_notes }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.preferred_time" label="期望时间" :span="2">{{ detail.preferred_time }}</el-descriptions-item>
              </template>

              <!-- 饮品服务 -->
              <template v-else-if="detail.drink_request">
                <el-descriptions-item label="饮品请求" :span="2">{{ detail.drink_request }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.drink_pickup_code" label="取餐码">{{ detail.drink_pickup_code }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.drink_sugar" label="糖度要求">{{ detail.drink_sugar }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.drink_pickup_qr_image" label="取餐二维码" :span="2">
                  <img :src="detail.drink_pickup_qr_image" alt="取餐码" style="max-width: 200px; display: block;" />
                </el-descriptions-item>
                <el-descriptions-item v-if="detail.preferred_time" label="期望时间" :span="2">{{ detail.preferred_time }}</el-descriptions-item>
              </template>

              <!-- 快递服务 -->
              <template v-else-if="detail.delivery_request">
                <el-descriptions-item label="快递请求" :span="2">{{ detail.delivery_request }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.delivery_name" label="收件人">{{ detail.delivery_name }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.delivery_phone" label="收件电话">{{ detail.delivery_phone }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.delivery_codes" label="快递单号" :span="2">{{ detail.delivery_codes }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.delivery_photo" label="送达照片" :span="2">
                  <img :src="detail.delivery_photo" alt="送达照片" style="max-width: 200px; display: block;" />
                </el-descriptions-item>
                <el-descriptions-item v-if="detail.delivery_message" label="送达留言" :span="2">{{ detail.delivery_message }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.delivery_photo_time" label="拍照时间">{{ detail.delivery_photo_time }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.preferred_time" label="期望时间">{{ detail.preferred_time }}</el-descriptions-item>
              </template>

              <!-- 跑腿服务 -->
              <template v-else-if="detail.errand_request">
                <el-descriptions-item label="跑腿请求" :span="2">{{ detail.errand_request }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.errand_location" label="地点">{{ detail.errand_location }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.errand_requirements" label="要求" :span="2">{{ detail.errand_requirements }}</el-descriptions-item>
                <el-descriptions-item v-if="detail.preferred_time" label="期望时间" :span="2">{{ detail.preferred_time }}</el-descriptions-item>
              </template>

              <!-- 如果没有任何订单内容，显示提示 -->
              <template v-else>
                <el-descriptions-item label="内容" :span="2">
                  <span style="color: #909399;">暂无详细内容</span>
                </el-descriptions-item>
              </template>
            </el-descriptions>

            <!-- 价格信息（服务订单不显示骑手报价） -->
            <el-descriptions v-if="detail.service_type !== 'phone_film' && detail.service_type !== 'massage'" title="价格信息" :column="2" size="small" border style="margin-top: 16px;">
              <el-descriptions-item label="骑手报价（总价）">
                <span v-if="detail.total_price" style="color: #f56c6c; font-weight: bold;">¥{{ detail.total_price }}</span>
                <span v-else-if="detail.rider_quoted_price" style="color: #f56c6c; font-weight: bold;">¥{{ detail.rider_quoted_price }}</span>
                <span v-else>-</span>
              </el-descriptions-item>
              <el-descriptions-item label="运费">
                <span v-if="detail.delivery_fee">¥{{ detail.delivery_fee }}</span>
                <span v-else>-</span>
              </el-descriptions-item>
              <el-descriptions-item label="商品金额">
                <span v-if="detail.product_price">¥{{ detail.product_price }}</span>
                <span v-else>-</span>
              </el-descriptions-item>
            </el-descriptions>

            <!-- 时间信息 -->
            <el-descriptions title="时间信息" :column="2" size="small" border style="margin-top: 16px;">
              <el-descriptions-item label="创建时间">{{ detail.created_at || '-' }}</el-descriptions-item>
              <el-descriptions-item label="接单时间">{{ detail.accepted_at || '-' }}</el-descriptions-item>
              <el-descriptions-item label="付款时间">{{ detail.paid_at || '-' }}</el-descriptions-item>
              <el-descriptions-item label="完成时间">{{ detail.completed_at || '-' }}</el-descriptions-item>
            </el-descriptions>
          </div>
        </template>
        <template #footer>
          <el-button
            v-if="canQuickDispatch(detail)"
            type="warning"
            :loading="dispatchingOrderId === detail.id"
            @click="handleQuickDispatch(detail)"
          >
            一键派单
          </el-button>
          <el-button @click="detailVisible = false">关闭</el-button>
        </template>
      </el-dialog>
    </div>
  </div>
</template>
