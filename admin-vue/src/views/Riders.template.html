<template>
  <div class="page">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span>骑手管理</span>
        </div>
        <ResponsiveActions :is-mobile="isMobile">
          <!-- PC端布局 -->
          <template #desktop>
            <el-input
              v-model="searchKeyword"
              placeholder="搜索姓名/手机号"
              size="small"
              style="width: 200px; margin-right: 8px;"
              clearable
              @keyup.enter="handleSearch"
            />
            <el-button size="small" @click="handleSearch">搜索</el-button>
            <el-button size="small" @click="loadRiders(true)" :loading="loading">刷新</el-button>
            <el-button type="warning" size="small" @click="handleReorganizeIds" :loading="reorganizing">ID重组</el-button>
            <el-button type="primary" size="small" @click="showAddDialog">新增骑手</el-button>
            <el-button type="success" size="small" @click="openInviteDialog">链接邀请</el-button>
            <el-button type="danger" size="small" @click="handleClearAllRiders" :loading="clearing">清空骑手</el-button>
          </template>
          
          <!-- 移动端布局 -->
          <template #mobile>
            <div class="mobile-search-row">
              <el-input
                v-model="searchKeyword"
                placeholder="搜索姓名/手机号"
                size="small"
                clearable
                @keyup.enter="handleSearch"
              >
                <template #prefix>
                  <el-icon><Search /></el-icon>
                </template>
              </el-input>
              <el-button size="small" type="primary" @click="handleSearch" :icon="Search">搜索</el-button>
            </div>
            <div class="mobile-filter-row">
              <el-button size="small" @click="loadRiders(true)" :loading="loading" :icon="Refresh">刷新</el-button>
              <el-dropdown trigger="click" @command="handleMobileAction">
                <el-button size="small" :icon="More">
                  更多
                </el-button>
                <template #dropdown>
                  <el-dropdown-menu>
                    <el-dropdown-item command="reorganize">
                      <el-icon><Sort /></el-icon>
                      <span>ID重组</span>
                    </el-dropdown-item>
                    <el-dropdown-item command="add" divided>
                      <el-icon><Plus /></el-icon>
                      <span>新增骑手</span>
                    </el-dropdown-item>
                    <el-dropdown-item command="invite">
                      <el-icon><Plus /></el-icon>
                      <span>链接邀请</span>
                    </el-dropdown-item>
                    <el-dropdown-item command="clear">
                      <el-icon><Delete /></el-icon>
                      <span>清空骑手</span>
                    </el-dropdown-item>
                  </el-dropdown-menu>
                </template>
              </el-dropdown>
            </div>
          </template>
        </ResponsiveActions>
      </div>
      <PageStateAlert :message="loadError" />
      <!-- PC端表格 -->
      <el-table v-if="!isMobile" :data="riders" stripe size="small" v-loading="loading">
        <el-table-column label="ID" width="150">
          <template #default="{ row }">
            {{ formatRoleId(row.role_id !== undefined && row.role_id !== null ? row.role_id : row.id, 'rider') }}
          </template>
        </el-table-column>
        <el-table-column prop="name" label="姓名" />
        <el-table-column prop="phone" label="手机号" />
        <el-table-column label="评分" width="140" align="center">
          <template #default="{ row }">
            <span style="color: #f59e0b; font-weight: 600;">★ {{ formatRating(row.rating) }}</span>
            <span style="color: #909399; margin-left: 4px;">({{ row.rating_count || 0 }})</span>
          </template>
        </el-table-column>
        <el-table-column prop="is_online" label="在线状态" width="120">
          <template #default="{ row }">
            <el-tag :type="row.is_online ? 'success' : 'info'" size="small" effect="dark">
              <span v-if="row.is_online">🟢 在线</span>
              <span v-else>⚪ 离线</span>
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="段位" width="120">
          <template #default="{ row }">
            <el-tag :type="getRankType(row.level)" size="small">
              {{ getRankName(row.level) }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column prop="created_at" label="创建时间" />
        <el-table-column label="操作" width="380" fixed="right">
          <template #default="{ row }">
            <el-button
              type="primary"
              text
              size="small"
              @click="openDetail(row)"
            >
              查看
            </el-button>
            <el-button
              type="primary"
              link
              size="small"
              @click="openRiderReviewManage(row)"
            >
              评论管理
            </el-button>
            <el-button
              type="primary"
              link
              size="small"
              @click="handleResetPassword(row)"
              :loading="resettingPassword === row.id"
            >
              重置密码
            </el-button>
            <el-button
              type="warning"
              link
              size="small"
              @click="handleDeleteRiderOrders(row)"
              :loading="deletingOrders === row.id"
            >
              清除订单
            </el-button>
            <el-button
              type="danger"
              link
              size="small"
              @click="handleDeleteRider(row)"
              :loading="deletingRider === row.id"
            >
              删除
            </el-button>
          </template>
        </el-table-column>
        <template #empty>
          <el-empty :description="loadError ? '加载失败，暂无可显示数据' : '暂无骑手数据'" :image-size="90" />
        </template>
      </el-table>

      <!-- 移动端卡片列表 -->
      <div v-else class="mobile-riders-list" v-loading="loading">
        <div
          v-for="rider in riders"
          :key="rider.id"
          class="mobile-rider-card"
          @click="openDetail(rider)"
        >
          <div class="mobile-rider-header">
            <div class="mobile-rider-id">ID: {{ rider.role_id !== undefined && rider.role_id !== null ? rider.role_id : rider.id }}</div>
            <el-tag :type="rider.is_online ? 'success' : 'info'" size="small" effect="dark">
              <span v-if="rider.is_online">🟢 在线</span>
              <span v-else>⚪ 离线</span>
            </el-tag>
          </div>
          
          <div class="mobile-rider-name">{{ rider.name || '-' }}</div>

          <div class="mobile-rider-info">
            <div class="info-item">
              <span class="info-label">📱 手机：</span>
              <span class="info-value">{{ rider.phone || '-' }}</span>
            </div>
            <div class="info-item">
              <span class="info-label">⭐ 评分：</span>
              <span class="info-value">{{ formatRating(rider.rating) }} ({{ rider.rating_count || 0 }})</span>
            </div>
            <div class="info-item">
              <span class="info-label">📅 创建：</span>
              <span class="info-value">{{ formatTime(rider.created_at) }}</span>
            </div>
          </div>

        </div>
        <div v-if="riders.length === 0 && !loading" class="mobile-empty-state">
          <div class="empty-icon">🛵</div>
          <div class="empty-text">暂无骑手</div>
        </div>
      </div>

      <div class="pagination-container">
        <el-pagination
          v-model:current-page="currentPage"
          v-model:page-size="pageSize"
          :page-sizes="isMobile ? [5, 10, 15] : [15, 30, 50, 100]"
          :total="total"
          :layout="isMobile ? 'total, prev, pager, next' : 'total, sizes, prev, pager, next, jumper'"
          @size-change="handleSizeChange"
          @current-change="handlePageChange"
        />
      </div>
    </div>

    <!-- 骑手详情对话框 -->
    <el-dialog v-model="detailVisible" title="骑手详情" width="600px" :close-on-click-modal="false">
      <div class="detail-container">
        <!-- 基本信息 -->
        <el-descriptions title="基本信息" :column="2" size="small" border>
          <el-descriptions-item label="骑手ID">{{ detail.id || '-' }}</el-descriptions-item>
          <el-descriptions-item label="角色ID">{{ detail.role_id || '-' }}</el-descriptions-item>
          <el-descriptions-item label="姓名">{{ detail.name || '-' }}</el-descriptions-item>
          <el-descriptions-item label="手机号">{{ detail.phone || '-' }}</el-descriptions-item>
          <el-descriptions-item label="评分">★ {{ formatRating(detail.rating) }}</el-descriptions-item>
          <el-descriptions-item label="评论数">{{ detail.rating_count || 0 }}</el-descriptions-item>
          <el-descriptions-item label="在线状态">
            <el-tag :type="detail.is_online ? 'success' : 'info'" size="small">
              <span v-if="detail.is_online">🟢 在线</span>
              <span v-else>⚪ 离线</span>
            </el-tag>
          </el-descriptions-item>
          <el-descriptions-item label="紧急联系人">{{ detail.emergency_contact_name || '-' }}</el-descriptions-item>
          <el-descriptions-item label="紧急联系人电话">{{ detail.emergency_contact_phone || '-' }}</el-descriptions-item>
          <el-descriptions-item label="身份证照片" :span="2">
            <el-image
              v-if="detail.id_card_front_preview_url || detail.id_card_front || detail.id_card_image"
              class="detail-image"
              :src="detail.id_card_front_preview_url || detail.id_card_front || detail.id_card_image"
              :preview-src-list="[detail.id_card_front_preview_url || detail.id_card_front || detail.id_card_image]"
              fit="cover"
            />
            <span v-else>-</span>
          </el-descriptions-item>
          <el-descriptions-item label="创建时间" :span="2">{{ detail.created_at || '-' }}</el-descriptions-item>
        </el-descriptions>
        
        <!-- 接单统计 -->
        <el-descriptions title="接单统计" :column="3" size="small" border style="margin-top: 20px;">
          <el-descriptions-item label="日接单">
            <span style="font-weight: 600; color: #409eff; font-size: 16px;">
              {{ detail.order_count_today !== undefined ? detail.order_count_today : '-' }}
            </span>
          </el-descriptions-item>
          <el-descriptions-item label="周接单">
            <span style="font-weight: 600; color: #e6a23c; font-size: 16px;">
              {{ detail.order_count_week !== undefined ? detail.order_count_week : '-' }}
            </span>
          </el-descriptions-item>
          <el-descriptions-item label="月接单">
            <span style="font-weight: 600; color: #67c23a; font-size: 16px;">
              {{ detail.order_count_month !== undefined ? detail.order_count_month : '-' }}
            </span>
          </el-descriptions-item>
        </el-descriptions>

        <el-descriptions title="入驻邀请信息" :column="2" size="small" border style="margin-top: 20px;">
          <el-descriptions-item label="来源">{{ formatOnboardingSource(detail.onboarding_info?.source) }}</el-descriptions-item>
          <el-descriptions-item label="邀请类型">{{ formatOnboardingType(detail.onboarding_info?.invite_type) }}</el-descriptions-item>
          <el-descriptions-item label="提交时间">{{ detail.onboarding_info?.submitted_at || '-' }}</el-descriptions-item>
          <el-descriptions-item label="邀请链接ID">{{ detail.onboarding_info?.invite_link_id || '-' }}</el-descriptions-item>
          <el-descriptions-item label="链接状态">{{ detail.onboarding_info?.invite_status || '-' }}</el-descriptions-item>
          <el-descriptions-item label="链接过期">{{ detail.onboarding_info?.invite_expires_at || '-' }}</el-descriptions-item>
        </el-descriptions>
      </div>
      <template #footer>
        <el-button type="primary" @click="openRiderEditDialog">编辑骑手信息</el-button>
        <el-button @click="detailVisible = false">关闭</el-button>
      </template>
    </el-dialog>

    <el-dialog v-model="riderEditVisible" title="编辑骑手信息" width="600px" :close-on-click-modal="false">
      <el-form :model="riderEditForm" label-width="120px">
        <el-form-item label="姓名" required>
          <el-input v-model="riderEditForm.name" placeholder="请输入姓名" />
        </el-form-item>
        <el-form-item label="手机号" required>
          <el-input v-model="riderEditForm.phone" maxlength="11" placeholder="请输入手机号" />
        </el-form-item>
        <el-form-item label="紧急联系人">
          <el-input v-model="riderEditForm.emergency_contact_name" placeholder="请输入紧急联系人" />
        </el-form-item>
        <el-form-item label="紧急联系人电话">
          <el-input v-model="riderEditForm.emergency_contact_phone" maxlength="11" placeholder="请输入紧急联系人电话" />
        </el-form-item>
        <el-form-item label="身份证照片">
          <div class="upload-box">
            <el-upload
              :show-file-list="false"
              :auto-upload="false"
              accept="image/*"
              :on-change="handleRiderIdCardChange"
            >
              <el-button :loading="uploadingRiderIdCard">上传照片</el-button>
            </el-upload>
            <el-image
              v-if="riderEditForm.id_card_front_preview_url || riderEditForm.id_card_front"
              class="detail-image"
              :src="riderEditForm.id_card_front_preview_url || riderEditForm.id_card_front"
              :preview-src-list="[riderEditForm.id_card_front_preview_url || riderEditForm.id_card_front]"
              fit="cover"
            />
          </div>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="riderEditVisible = false">取消</el-button>
        <el-button type="primary" :loading="savingRiderEdit" @click="saveRiderEdit">保存</el-button>
      </template>
    </el-dialog>

    <el-dialog v-model="reviewManageVisible" :title="`评论管理 - ${reviewTargetRider.name || reviewTargetRider.phone || ''}`" width="900px" :close-on-click-modal="false">
      <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <span style="color: #f59e0b; font-weight: 700;">★ {{ formatRating(reviewTargetRider.rating) }}</span>
          <span style="color: #909399; margin-left: 8px;">评论数 {{ reviewTargetRider.rating_count || 0 }}</span>
        </div>
        <div>
          <el-button size="small" @click="loadRiderReviews(reviewTargetRider.id)" :loading="riderReviewsLoading">刷新</el-button>
          <el-button type="primary" size="small" @click="openCreateRiderReviewDialog">新增评论</el-button>
        </div>
      </div>

      <el-table :data="riderReviews" size="small" stripe v-loading="riderReviewsLoading">
        <el-table-column prop="id" label="ID" width="80" />
        <el-table-column prop="userName" label="用户" min-width="120" />
        <el-table-column label="评分" width="120">
          <template #default="{ row }">
            <span style="color: #f59e0b;">★ {{ formatRating(row.rating) }}</span>
          </template>
        </el-table-column>
        <el-table-column prop="content" label="评论内容" min-width="280" show-overflow-tooltip />
        <el-table-column label="创建时间" width="180">
          <template #default="{ row }">
            {{ formatTime(row.createdAt || row.created_at) }}
          </template>
        </el-table-column>
        <el-table-column label="操作" width="170" fixed="right">
          <template #default="{ row }">
            <el-button type="primary" text size="small" @click="openEditRiderReviewDialog(row)">编辑</el-button>
            <el-button type="danger" text size="small" @click="handleDeleteRiderReview(row)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>
      <div v-if="!riderReviewsLoading && riderReviews.length === 0" style="color: #909399; padding-top: 12px;">暂无评论</div>
    </el-dialog>

    <el-dialog v-model="riderReviewDialogVisible" :title="riderReviewEditingId ? '编辑评论' : '新增评论'" width="620px" :close-on-click-modal="false">
      <el-form :model="riderReviewForm" label-width="100px">
        <el-form-item label="用户名称">
          <el-input v-model="riderReviewForm.userName" placeholder="匿名用户" />
        </el-form-item>
        <el-form-item label="评分" required>
          <el-input-number v-model="riderReviewForm.rating" :min="1" :max="5" :step="0.1" :precision="1" style="width: 100%" />
        </el-form-item>
        <el-form-item label="用户ID">
          <el-input v-model="riderReviewForm.userId" placeholder="请输入用户ID" />
        </el-form-item>
        <el-form-item label="订单ID">
          <el-input v-model="riderReviewForm.orderId" placeholder="请输入订单ID" />
        </el-form-item>
        <el-form-item label="用户头像">
          <ImageUpload v-model="riderReviewForm.userAvatar" upload-domain="profile_image" />
        </el-form-item>
        <el-form-item label="评论内容" required>
          <el-input v-model="riderReviewForm.content" type="textarea" :rows="4" maxlength="500" show-word-limit />
        </el-form-item>
        <el-form-item label="评论图片">
          <div class="review-upload-box">
            <el-upload
              :show-file-list="false"
              :auto-upload="false"
              accept="image/*"
              :on-change="handleRiderReviewImageChange"
            >
              <el-button :loading="uploadingRiderReviewImage">上传图片</el-button>
            </el-upload>

            <div v-if="Array.isArray(riderReviewForm.images) && riderReviewForm.images.length" class="review-image-list">
              <div v-for="(img, index) in riderReviewForm.images" :key="`${img}-${index}`" class="review-image-item">
                <el-image
                  class="review-image-thumb"
                  :src="img"
                  :preview-src-list="riderReviewForm.images"
                  fit="cover"
                />
                <el-button type="danger" text size="small" @click="removeRiderReviewImage(index)">删除</el-button>
              </div>
            </div>
            <div v-else class="review-upload-tip">暂无图片，可上传多张</div>
          </div>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="riderReviewDialogVisible = false">取消</el-button>
        <el-button type="primary" :loading="riderReviewSaving" @click="saveRiderReview">保存</el-button>
      </template>
    </el-dialog>

    <!-- 新增骑手对话框 -->
    <el-dialog v-model="addDialogVisible" title="新增骑手" width="500px" :close-on-click-modal="false">
      <el-form :model="newRider" label-width="100px">
        <el-form-item label="手机号" required>
          <el-input v-model="newRider.phone" placeholder="请输入手机号" />
        </el-form-item>
        <el-form-item label="姓名" required>
          <el-input v-model="newRider.name" placeholder="请输入姓名" />
        </el-form-item>
        <el-form-item label="密码" required>
          <el-input v-model="newRider.password" type="password" placeholder="至少6位密码" show-password />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="addDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="handleAddRider" :loading="addingRider">确定</el-button>
      </template>
    </el-dialog>

    <el-dialog v-model="inviteDialogVisible" title="骑手邀请链接" width="620px" :close-on-click-modal="false">
      <el-form :model="inviteForm" label-width="110px">
        <el-form-item label="有效期(小时)">
          <el-input-number v-model="inviteForm.expires_hours" :min="1" :max="720" />
        </el-form-item>
        <el-form-item label="可用次数">
          <el-input-number v-model="inviteForm.max_uses" :min="1" :max="1000" />
        </el-form-item>
        <el-form-item label="邀请链接" v-if="inviteResult.invite_url">
          <el-input v-model="inviteResult.invite_url" readonly />
        </el-form-item>
        <el-form-item label="状态" v-if="inviteResult.invite_url">
          <span class="invite-meta">总次数：{{ inviteResult.max_uses || 1 }}，剩余：{{ getInviteRemainingUses() }}，过期时间：{{ formatInviteDateTime(inviteResult.expires_at) }}</span>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="inviteDialogVisible = false">关闭</el-button>
        <el-button v-if="inviteResult.invite_url" @click="copyInviteUrl">复制链接</el-button>
        <el-button type="primary" :loading="creatingInvite" @click="createInviteLink">生成链接</el-button>
      </template>
    </el-dialog>
  </div>
</template>
