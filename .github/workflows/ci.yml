name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  repo-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node --check scripts/http-load-smoke.mjs
      - run: node --check scripts/release-preflight.mjs
      - run: node --check scripts/release-drill.mjs
      - run: node --check scripts/release-live-cutover.mjs
      - run: node --check scripts/release-rollback-verify.mjs
      - run: node --check scripts/release-failure-verify.mjs
      - run: node --check scripts/release-evidence-gate.mjs
      - run: node --check scripts/release-manual-attestation-template.mjs
      - run: node --check scripts/release-manual-attestation-prefill.mjs
      - run: node --check scripts/release-final-signoff.mjs
      - run: node --check scripts/release-go-live-bundle.mjs
      - run: node --check scripts/failure-drill-prep.mjs
      - run: node --check scripts/push-real-device-prep.mjs
      - run: node --check scripts/rtc-real-device-prep.mjs
      - run: node --check scripts/realtime-load-plan.mjs
      - run: node --check scripts/realtime-acceptance-gate.mjs
      - run: node --check scripts/architecture/check-admin-core-adoption.mjs
      - run: node --check scripts/architecture/check-mobile-shared-runtime-adoption.mjs
      - run: node --check scripts/security/secret-rotation-evidence.mjs
      - run: node --check scripts/security/generate-secret-rotation-evidence.mjs
      - run: node --check scripts/security/check-secret-rotation-evidence.mjs

  execution-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/governance/check-execution-ledger.mjs

  modernization:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            merchant-app/package-lock.json
            rider-app/package-lock.json
            user-vue/package-lock.json
            app-mobile/package-lock.json
            admin-vue/package-lock.json
            backend/bff/package-lock.json
            socket-server/package-lock.json
            backend/bank-payout-sidecar/package-lock.json
            backend/alipay-sidecar/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go/go.mod
          cache-dependency-path: backend/go/go.sum
      - run: npm ci
      - run: npm --prefix merchant-app ci
      - run: npm --prefix rider-app ci
      - run: npm --prefix user-vue ci
      - run: npm --prefix app-mobile ci
      - run: npm --prefix backend/bff ci
      - run: npm --prefix socket-server ci
      - run: npm --prefix backend/alipay-sidecar ci
      - run: npm run verify:modernization

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/security/check-committed-secrets.mjs

  backend-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/security/verify-backend-audits.mjs

  api-contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/contracts/check-http-contract-drift.mjs
      - run: node scripts/contracts/check-identity-upload-contract-drift.mjs
      - run: node scripts/architecture/check-admin-core-adoption.mjs
      - run: node scripts/architecture/check-mobile-shared-runtime-adoption.mjs

  go-vulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go/go.mod
          cache-dependency-path: backend/go/go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: $(go env GOPATH)/bin/govulncheck ./...
