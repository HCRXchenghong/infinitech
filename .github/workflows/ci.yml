name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check scripts/http-load-smoke.mjs
      - run: node --check scripts/release-preflight.mjs

  go-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go/go.mod
      - run: go test ./...
      - run: go build ./cmd

  bff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/bff/package-lock.json
      - run: npm ci
      - run: npm test -- --runInBand
      - run: npm run lint

  admin-vue:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-vue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-vue/package-lock.json
      - run: npm ci
      - run: npm run build

  socket-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: socket-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: socket-server/package-lock.json
      - run: npm ci
      - run: npm run check
